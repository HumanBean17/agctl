name: tests

# Runs the test suite on PRs that touch source code.
# paths-ignore: the workflow only SKIPS when every changed file is markdown,
# so a PR that touches both .py and .md still runs.
on:
  pull_request:
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install agctl with all client extras and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,http,jq,kafka,db,logs,grpc]"

      - name: Run tests
        run: pytest tests/unit
