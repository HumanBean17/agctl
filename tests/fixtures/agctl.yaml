version: "3"

services:
  order-service:
    base_url: "${ORDER_SERVICE_URL}"
    health_path: "/actuator/health"
    timeout_seconds: 10

  payment-service:
    base_url: "${PAYMENT_SERVICE_URL}"
    health_path: "/health"
    timeout_seconds: 15

kafka:
  clusters:
    default:
      brokers:
        - "${KAFKA_BROKER}"
      default_consumer_group: "agctl-consumer"
      schema_registry_url: "${SCHEMA_REGISTRY_URL:-}"
      timeout_seconds: 30
      # Optional TLS/mTLS — uncomment for brokers that require SSL. Setting any
      # field enables TLS (security.protocol defaults to "SSL"). Env override:
      # AGCTL_KAFKA__CLUSTERS__DEFAULT__SSL__CA_LOCATION, etc.
      # ssl:
      #   ca_location: "${KAFKA_SSL_CA:-}"
      #   certificate_location: "${KAFKA_SSL_CERT:-}"
      #   key_location: "${KAFKA_SSL_KEY:-}"
      #   key_password: "${KAFKA_SSL_KEY_PASSWORD:-}"
      #   # endpoint_identification_algorithm: "none"   # disable hostname verification
      #   # security_protocol: "SSL"                    # default SSL; SASL_SSL when adding SASL

  default_cluster: default

  patterns:
    order-created:
      description: "An ORDER_CREATED event for a specific order"
      topic: orders.created
      match: '.value.eventType == "ORDER_CREATED" and .value.payload.orderId == "{orderId}"'

    payment-failed:
      description: "Any PAYMENT_FAILED event regardless of order"
      topic: payments.events
      match: '.value.eventType == "PAYMENT_FAILED"'

database:
  connections:
    main-db:
      type: postgresql
      host: "${DB_HOST}"
      port: "${DB_PORT:-5432}"
      dbname: "${DB_NAME}"
      user: "${DB_USER}"
      password: "${DB_PASSWORD}"
      default: true

    main-db-writable:
      # In production, this should point at a separate least-privilege write-capable account
      # (e.g., ${DB_WRITE_USER}/${DB_WRITE_PASSWORD}). The test fixture reuses the shared
      # testcontainer superuser because a testcontainer exposes a single superuser.
      type: postgresql
      host: "${DB_HOST}"
      port: "${DB_PORT:-5432}"
      dbname: "${DB_NAME}"
      user: "${DB_USER}"
      password: "${DB_PASSWORD}"
      writable: true

    analytics-db:
      type: postgresql
      host: "${ANALYTICS_DB_HOST}"
      port: "${ANALYTICS_PORT:-5432}"
      dbname: "analytics"
      user: "${ANALYTICS_DB_USER}"
      password: "${ANALYTICS_DB_PASSWORD}"

  templates:
    find-order:
      description: "Fetch a single order by ID"
      connection: main-db
      sql: "SELECT id, status, total_cents, created_at FROM orders WHERE id = :orderId"

    orders-by-status:
      description: "List orders in a given status, optionally filtered by customer"
      connection: main-db
      sql: "SELECT id, status FROM orders WHERE status = :status AND customer_id = :customerId"

    count-failed-payments:
      description: "Count failed payments after a given timestamp"
      connection: main-db
      sql: "SELECT COUNT(*) AS cnt FROM payments WHERE status = 'FAILED' AND created_at > :since"

    seed-order:
      description: "Insert or ignore an order in the seed table"
      mode: write
      connection: main-db-writable
      sql: "INSERT INTO agctl_seed (id, status) VALUES (:orderId, :status) ON CONFLICT (id) DO NOTHING RETURNING id, status"

templates:
  create-order:
    description: "Submit a new order for a customer"
    method: POST
    service: order-service
    path: "/api/v1/orders"
    headers:
      Content-Type: "application/json"
      X-Request-Source: "agctl"
    body:
      customer_id: "{customer_id}"
      items:
        - sku: "{sku}"
          quantity: 1

  get-order:
    description: "Fetch a single order by ID"
    method: GET
    service: order-service
    path: "/api/v1/orders/{order_id}"

  charge-payment:
    description: "Trigger payment charge for an order"
    method: POST
    service: payment-service
    path: "/api/v1/payments"
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer ${PAYMENT_SERVICE_TOKEN}"
    body:
      order_id: "{order_id}"
      amount_cents: "{amount_cents}"

  get-payment-status:
    description: "Fetch payment status by order ID"
    method: GET
    service: payment-service
    path: "/api/v1/payments/{order_id}/status"

defaults:
  timeout_seconds: 10
  database_connection: main-db

logs:
  sources:
    order-service:
      path: "logs/order-service.log"
      format: logstash
      service: order-service
    payment-service:
      path: "logs/payment-service.log"
      format: logstash
      service: payment-service
  defaults:
    tail_lines: 200
    limit: 50
    timeout_seconds: 10
    poll_interval_ms: 100

mocks:
  http:
    listen: "0.0.0.0:18080"
    stubs:
      charge-ok:
        description: "Successful charge for a payment"
        method: POST
        path: /v1/charge
        match:
          body:
            amount_cents: 1000
        response:
          status: 200
          headers:
            Content-Type: application/json
          body:
            status: ok
      healthz:
        description: "Health check endpoint"
        method: GET
        path: /healthz
        response:
          status: 200
          body:
            status: ok
  grpc:
    listen: "0.0.0.0:50051"
    stubs:
      echo-ok:
        description: "Successful unary echo response"
        service: echo.Echo
        method: Unary
        match:
          body:
            msg: hello
        response:
          status: OK
          message:
            msg: "{msg}"
      echo-status:
        description: "Health status response"
        service: grpc.health.v1.Health
        method: Check
        response:
          status: OK
          message:
            status: SERVING
  kafka:
    reactors:
      order-confirmation:
        description: "Confirm an order when ORDER_CREATED is seen"
        topic: orders.created
        consumer_group: mock-order-reactor
        match: '.value.eventType == "ORDER_CREATED"'
        reaction:
          topic: orders.confirmed
          value:
            event: ORDER_CONFIRMED
      payment-audit:
        description: "Audit log on PAYMENT_FAILED"
        topic: payments.events
        consumer_group: mock-payment-audit
        reaction:
          topic: audit.events
          value:
            kind: payment_failed

grpc:
  targets:
    echo:
      address: "${TEST_GRPC_ADDR:-localhost:50051}"
      use_tls: false
      reflection: auto
  descriptors: []
  templates:
    echo-unary:
      description: "Unary echo call"
      target: echo
      service: echo.Echo
      method: Unary
      message:
        msg: "{m}"
